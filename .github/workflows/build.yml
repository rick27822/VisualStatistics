name: Build

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: ubuntu-latest
    container:
      image: registry.nju.edu.cn/qt/qt:6.5.0
    steps:
    - uses: actions/checkout@v4

    - name: Install MinGW
      run: |
        apt-get update && apt-get install -y mingw-w64

    - name: Build for Windows
      run: |
        mkdir -p build
        cd build
        x86_64-w64-mingw32-qmake-qt6 ../VisualStatistics.pro CONFIG+=release
        x86_64-w64-mingw32-make -j$(nproc)

    - name: Install windeployqt replacement
      run: |
        apt-get install -y p7zip-full

    - name: Deploy dependencies
      run: |
        cd build
        mkdir -p deploy
        cp VisualStatistics.exe deploy/
        cp /usr/x86_64-w64-mingw32/lib/*.dll deploy/ 2>/dev/null || true
        cp /opt/qt6/lib/*.dll deploy/ 2>/dev/null || true
        cp /opt/qt6/plugins/platforms deploy/ -r
        cp /opt/qt6/plugins/imageformats deploy/ -r
        cp /opt/qt6/plugins/styles deploy/ -r

    - name: Package
      run: |
        cd build/deploy
        7z a VisualStatistics-windows.zip *

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: VisualStatistics-windows
        path: build/deploy/VisualStatistics-windows.zip