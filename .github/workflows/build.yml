name: Build

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.5.0'
        host: 'windows'
        target: 'desktop'
        modules: 'qtwebengine qtprintsupport'
        tools: 'tools_vcredist'
        cache: true
    
    - name: Build
      shell: cmd
      run: |
        mkdir build
        cd build
        qmake ..\VisualStatistics.pro CONFIG+=release
        nmake /NOLOGO
    
    - name: Deploy
      shell: cmd
      run: |
        cd build
        windeployqt VisualStatistics.exe --release
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: VisualStatistics-windows
        path: |
          build/VisualStatistics.exe
          build/*.dll
          build/platforms/
          build/imageformats/
          build/styles/
          build/QtWebEngineProcess.exe
          build/resources/