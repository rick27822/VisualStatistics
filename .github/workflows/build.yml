name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macos-14
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.4.3'
        host: 'mac'
        target: 'desktop'
        modules: 'qtwebengine qtprintsupport'
        cache: true
    
    - name: Build
      run: |
        mkdir -p build
        cd build
        qmake ../VisualStatistics.pro CONFIG+=release
        make -j$(sysctl -n hw.ncpu)
    
    - name: Deploy
      run: |
        macdeployqt build/VisualStatistics.app -dmg -verbose=2
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: VisualStatistics-macos
        path: build/VisualStatistics.dmg

  build-windows:
    runs-on: windows-2022
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.4.3'
        host: 'windows'
        target: 'desktop'
        modules: 'qtwebengine qtprintsupport'
        cache: true
    
    - name: Build
      shell: cmd
      run: |
        mkdir build
        cd build
        qmake ..\VisualStatistics.pro CONFIG+=release
        nmake /NOLOGO
    
    - name: Deploy
      shell: cmd
      run: |
        cd build
        windeployqt VisualStatistics.exe --release --verbose
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: VisualStatistics-windows
        path: |
          build/VisualStatistics.exe
          build/*.dll
          build/platforms/
          build/imageformats/
          build/styles/
          build/iconengines/
          build/tls/
          build/networkinformation/
          build/QtWebEngineProcess.exe
          build/resources/
          build/translations/