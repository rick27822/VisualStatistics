name: Build

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt using Chocolatey (latest version)
      run: |
        choco install qt -y
    
    - name: Find Qt installation
      run: |
        Get-ChildItem -Path "C:\Qt\" -Recurse -Name | Select-Object -First 20
    
    - name: Build
      shell: cmd
      run: |
        for /d %%i in (C:\Qt\*) do set QT_PATH=%%i\msvc2019_64\bin
        set PATH=%QT_PATH%;%PATH%
        mkdir build
        cd build
        qmake ..\VisualStatistics.pro CONFIG+=release
        nmake /NOLOGO
    
    - name: Deploy
      shell: cmd
      run: |
        cd build
        windeployqt VisualStatistics.exe --release
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: VisualStatistics-windows
        path: |
          build/VisualStatistics.exe
          build/*.dll
          build/platforms/
          build/imageformats/
          build/styles/
          build/QtWebEngineProcess.exe
          build/resources/