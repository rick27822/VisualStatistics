name: Build

on:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt using Chocolatey
      run: |
        choco install qt6 -y --version=6.5.0
    
    - name: Build
      shell: cmd
      run: |
        set PATH=C:\Qt\6.5.0\msvc2019_64\bin;%PATH%
        mkdir build
        cd build
        qmake ..\VisualStatistics.pro CONFIG+=release
        nmake /NOLOGO
    
    - name: Deploy
      shell: cmd
      run: |
        cd build
        windeployqt VisualStatistics.exe --release
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: VisualStatistics-windows
        path: |
          build/VisualStatistics.exe
          build/*.dll
          build/platforms/
          build/imageformats/
          build/styles/
          build/QtWebEngineProcess.exe
          build/resources/