name: Build Windows Release

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt with MinGW
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw'
          dir: '${{ github.workspace }}'
          install-deps: 'true'
          modules: 'qtwebengine qtwebchannel qtpositioning'

      - name: Configure Qt Project
        run: |
          qmake VisualStatistics.pro

      - name: Build Project
        run: |
          mingw32-make release

      - name: Deploy Qt Dependencies
        run: |
          cd release
          windeployqt VisualStatistics.exe --release --no-translations

      - name: Create Distribution Folder
        run: |
          mkdir VisualStatistics-Windows
          xcopy /E /I release VisualStatistics-Windows
          echo "Built successfully!" > VisualStatistics-Windows/BUILD_INFO.txt
          echo "Commit: ${{ github.sha }}" >> VisualStatistics-Windows/BUILD_INFO.txt

      - name: Compress to ZIP
        run: |
          Compress-Archive -Path VisualStatistics-Windows\* -DestinationPath VisualStatistics-Windows.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VisualStatistics-Windows
          path: VisualStatistics-Windows.zip
